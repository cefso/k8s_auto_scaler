# 示例 values（复制后按需修改，勿提交明文到 Git）
# helm upgrade --install k8s-scaler ./charts/k8s-auto-scaler -f values-example.yaml

# 默认 true：未填写的 secrets.* 由 Chart 首次安装时自动生成
secrets:
  autoGenerate: true
  # 若需自行指定，可关闭自动生成并填写：
  # autoGenerate: false
  # jwtSecretKey: ""
  # kubeconfigEncryptionKey: ""
  # initAdminPassword: ""

ingress:
  enabled: true
  className: apisix
  # ingress.websocket.enabled=true 时，按 className 自动添加 WebSocket 注解：
  #   apisix → k8s.apisix.apache.org/enable-websocket + upstream 超时
  #   nginx  → nginx.ingress.kubernetes.io/proxy-read/send-timeout
  websocket:
    enabled: true
    # provider: apisix   # className 与控制器不一致时可显式指定
    timeoutSeconds: 3600
  hosts:
    - host: scaler.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: scaler-tls
      hosts:
        - scaler.example.com

backend:
  env:
    CORS_ORIGINS: https://scaler.example.com
