# 示例 values（复制后按需修改，勿提交明文到 Git）
# helm upgrade --install k8s-scaler ./charts/k8s-auto-scaler -f values-example.yaml

# 默认 true：未填写的 secrets.* 由 Chart 首次安装时自动生成
secrets:
  autoGenerate: true
  # 若需自行指定，可关闭自动生成并填写：
  # autoGenerate: false
  # jwtSecretKey: ""
  # kubeconfigEncryptionKey: ""
  # initAdminPassword: ""

ingress:
  enabled: true
  className: nginx
  # WebSocket 日志流经 Ingress 时需较长超时（与前端 nginx proxy_read_timeout 配合）
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: scaler.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: scaler-tls
      hosts:
        - scaler.example.com

backend:
  env:
    CORS_ORIGINS: https://scaler.example.com
