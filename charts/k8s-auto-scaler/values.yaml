# 默认 values — 生产部署前请覆盖 secrets 与 ingress.hosts

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

backend:
  image:
    repository: ghcr.io/cefso/k8s-scaler-backend
    tag: latest
    pullPolicy: Always
  # APScheduler 使用进程内调度，必须单副本
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8082
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /app/data
  env:
    DEBUG: "false"
    DATABASE_URL: sqlite+aiosqlite:///./data/k8s_dashboard.db
    JWT_EXPIRE_MINUTES: "480"
    INIT_ADMIN_USERNAME: admin
    # 逗号分隔；Ingress 启用时请在安装时设置为对外访问地址
    CORS_ORIGINS: ""

frontend:
  image:
    repository: ghcr.io/cefso/k8s-scaler-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 5173
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# 敏感配置：默认自动生成并写入 Secret（upgrade 时保留已有值）
# 若需自行指定，填写下列字段或设置 autoGenerate: false
secrets:
  create: true
  autoGenerate: true
  # 设为 true 并 helm upgrade 可强制重写 Secret 中的自动生成密钥（跳过 lookup 保留旧值）
  forceRegenerate: false
  existingSecret: ""
  jwtSecretKey: ""
  kubeconfigEncryptionKey: ""
  initAdminPassword: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  # Pod 日志 WebSocket：按 className（nginx / apisix）自动合并 Ingress 注解
  websocket:
    enabled: true
    # 留空则根据 className 推断；可显式设为 nginx 或 apisix
    provider: ""
    timeoutSeconds: 3600
  hosts:
    - host: k8s-scaler.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}
podLabels: {}
commonLabels: {}
