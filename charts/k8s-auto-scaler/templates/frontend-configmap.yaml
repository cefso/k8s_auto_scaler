apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-auto-scaler.frontend.fullname" . }}-nginx
  labels:
    {{- include "k8s-auto-scaler.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  00-upgrade-map.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
  default.conf: |
    server {
        listen {{ .Values.frontend.service.port }};
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api {
            proxy_pass http://{{ include "k8s-auto-scaler.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
