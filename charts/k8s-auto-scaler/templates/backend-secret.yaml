{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-auto-scaler.secretName" . }}
  labels:
    {{- include "k8s-auto-scaler.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ required "secrets.jwtSecretKey is required when secrets.create=true" .Values.secrets.jwtSecretKey | quote }}
  KUBECONFIG_ENCRYPTION_KEY: {{ required "secrets.kubeconfigEncryptionKey is required when secrets.create=true" .Values.secrets.kubeconfigEncryptionKey | quote }}
  INIT_ADMIN_PASSWORD: {{ required "secrets.initAdminPassword is required when secrets.create=true" .Values.secrets.initAdminPassword | quote }}
{{- end }}
