{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-auto-scaler.secretName" . }}
  labels:
    {{- include "k8s-auto-scaler.labels" . | nindent 4 }}
  annotations:
    # 提醒：密钥由 Chart 首次安装时生成，upgrade 通过 lookup 保留，请勿随意删除 Secret
    k8s-auto-scaler/secret-managed-by: helm
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ include "k8s-auto-scaler.secret.jwtSecretKey" . | quote }}
  KUBECONFIG_ENCRYPTION_KEY: {{ include "k8s-auto-scaler.secret.kubeconfigEncryptionKey" . | quote }}
  INIT_ADMIN_PASSWORD: {{ include "k8s-auto-scaler.secret.initAdminPassword" . | quote }}
{{- end }}
