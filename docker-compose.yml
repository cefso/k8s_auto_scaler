services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k8s-scaler-backend
    ports:
      - "8082:8082"
    volumes:
      - backend-data:/app/data
    env_file:
      - .env
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///./data/k8s_dashboard.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: k8s-scaler-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
